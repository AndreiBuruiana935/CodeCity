
<style>
#w3d{position:relative}
#cv{display:block;border-radius:12px;cursor:grab}
#ov{position:absolute;top:0;left:0;width:100%;pointer-events:none;overflow:hidden}
.nl{position:absolute;font-size:10px;color:rgba(255,255,255,0.6);transform:translate(-50%,-50%);white-space:nowrap;padding:1px 5px;border-radius:3px;font-family:sans-serif;transition:opacity .15s}
.nl.hi{color:#fff;background:rgba(0,0,0,0.7);z-index:2;font-size:11px}
#ip{position:absolute;bottom:14px;right:14px;width:188px;background:rgba(8,12,22,0.94);border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px;pointer-events:auto;display:none}
.ipn{font-size:13px;font-weight:500;color:#fff;margin-bottom:3px;font-family:sans-serif}
.ipl{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:5px;font-family:sans-serif;text-transform:capitalize}
.ipd{font-size:11px;color:rgba(255,255,255,0.55);margin-bottom:10px;font-family:sans-serif}
.ipb{font-size:11px;padding:5px 10px;width:100%;background:rgba(127,119,221,0.18);border:0.5px solid rgba(127,119,221,0.5);border-radius:6px;color:#c8c4ff;cursor:pointer;font-family:sans-serif}
.ipb:hover{background:rgba(127,119,221,0.4)}
#ht{position:absolute;bottom:14px;left:14px;font-size:10px;color:rgba(255,255,255,0.22);pointer-events:none;font-family:sans-serif}
</style>

<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
  <span style="font-size:11px;color:var(--color-text-secondary);margin-right:2px">Layer:</span>
  <button id="fa" style="font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-text-primary);color:var(--color-background-primary);cursor:pointer" onclick="flt('all')">All</button>
  <button id="fdb" style="font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer" onclick="flt('db')">Database</button>
  <button id="fbe" style="font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer" onclick="flt('be')">Backend</button>
  <button id="fapi" style="font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer" onclick="flt('api')">API</button>
  <button id="ffe" style="font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer" onclick="flt('fe')">Frontend</button>
</div>
<div id="w3d">
  <canvas id="cv"></canvas>
  <div id="ov"></div>
  <div id="ip">
    <div class="ipn" id="ipn"></div>
    <div class="ipl" id="ipl"></div>
    <div class="ipd" id="ipd"></div>
    <button class="ipb" onclick="doask()">Ask AI about this ↗</button>
  </div>
  <div id="ht">Drag to orbit · scroll to zoom · click a node</div>
</div>
<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--color-text-secondary);align-items:center">
  <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#BA7517;display:inline-block"></span>Database</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#1D9E75;display:inline-block"></span>Backend</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#7F77DD;display:inline-block"></span>API endpoints</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#D85A30;display:inline-block"></span>Frontend</span>
  <span style="margin-left:auto;font-size:11px;opacity:0.5">500+ nodes: LOD clustering kicks in</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const cv=document.getElementById('cv');
const ov=document.getElementById('ov');
const H=500;
let W=cv.parentElement?.clientWidth||680;
cv.style.height=H+'px';
ov.style.height=H+'px';

const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x080c14);

const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(52,W/H,0.1,200);
let ph=0.88,th=0.55,rr=26;

function uc(){
  cam.position.set(rr*Math.sin(ph)*Math.sin(th),rr*Math.cos(ph),rr*Math.sin(ph)*Math.cos(th));
  cam.lookAt(0,0,0);
}
uc();

scene.add(new THREE.AmbientLight(0xffffff,0.5));
const dl=new THREE.DirectionalLight(0xffffff,0.9);
dl.position.set(10,16,8);
scene.add(dl);
const dl2=new THREE.DirectionalLight(0x4466ff,0.3);
dl2.position.set(-8,-4,-6);
scene.add(dl2);

const LY={
  db: {y:-7,  c:0xBA7517,name:'database'},
  be: {y:-2.5,c:0x1D9E75,name:'backend'},
  api:{y:2.5, c:0x7F77DD,name:'api'},
  fe: {y:7,   c:0xD85A30,name:'frontend'},
};

Object.entries(LY).forEach(([k,l])=>{
  const g=new THREE.GridHelper(22,11,l.c,l.c);
  g.material.opacity=0.08;g.material.transparent=true;g.position.y=l.y;
  scene.add(g);
  const pg=new THREE.PlaneGeometry(22,22);
  const pm=new THREE.MeshBasicMaterial({color:l.c,transparent:true,opacity:0.025,side:THREE.DoubleSide});
  const pp=new THREE.Mesh(pg,pm);pp.rotation.x=-Math.PI/2;pp.position.y=l.y;
  scene.add(pp);
});

const ND=[
  {id:'u',  lb:'users',          l:'db', x:-3.5,z:-1.5},
  {id:'o',  lb:'orders',         l:'db', x:0.5, z:2},
  {id:'pr', lb:'products',       l:'db', x:4,   z:-0.5},
  {id:'se', lb:'sessions',       l:'db', x:1.5, z:3.5},
  {id:'ath',lb:'AuthService',    l:'be', x:-4,  z:-1},
  {id:'ods',lb:'OrderService',   l:'be', x:0,   z:1.5},
  {id:'pds',lb:'ProductService', l:'be', x:3.5, z:-0.5},
  {id:'pay',lb:'PaymentService', l:'be', x:1.5, z:-2.5},
  {id:'ntf',lb:'NotifService',   l:'be', x:5.2, z:2.5},
  {id:'el', lb:'POST /auth',     l:'api',x:-4.5,z:-0.5},
  {id:'ego',lb:'GET /orders',    l:'api',x:-1.5,z:2},
  {id:'epo',lb:'POST /orders',   l:'api',x:1,   z:0},
  {id:'epp',lb:'GET /products',  l:'api',x:4,   z:-1},
  {id:'epu',lb:'PUT /users',     l:'api',x:-3,  z:-3},
  {id:'fl', lb:'LoginPage',      l:'fe', x:-4.5,z:-0.5},
  {id:'fd', lb:'Dashboard',      l:'fe', x:-1,  z:1.5},
  {id:'fp', lb:'ProductList',    l:'fe', x:3.5, z:-0.5},
  {id:'fc', lb:'Checkout',       l:'fe', x:0.5, z:3},
  {id:'fpr',lb:'Profile',        l:'fe', x:-3.5,z:3},
];

const CO=[
  ['fl','el'],['fd','ego'],['fp','epp'],['fc','epo'],['fpr','epu'],
  ['el','ath'],['ego','ods'],['epo','ods'],['epo','pay'],['epp','pds'],['epu','ath'],
  ['ath','u'],['ath','se'],['ods','o'],['ods','ntf'],['pds','pr'],['pay','o'],
];

const mm={},ml=[];
ND.forEach(n=>{
  const ly=LY[n.l];
  const geo=new THREE.BoxGeometry(1.05,0.3,0.62);
  const mat=new THREE.MeshStandardMaterial({color:ly.c,metalness:0.15,roughness:0.6,transparent:true,opacity:0.88});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(n.x,ly.y,n.z);
  m.userData={id:n.id,lb:n.lb,l:n.l,lname:ly.name};
  scene.add(m);mm[n.id]=m;ml.push(m);
});

const ll=[],cr=[];
CO.forEach(([a,b],i)=>{
  const ma=mm[a],mb=mm[b];if(!ma||!mb)return;
  const pa=ma.position,pb=mb.position;
  const ctrl=new THREE.Vector3(
    (pa.x+pb.x)/2+Math.sin(i*2.13)*2.2,
    (pa.y+pb.y)/2,
    (pa.z+pb.z)/2+Math.cos(i*1.71)*2.2
  );
  const curve=new THREE.QuadraticBezierCurve3(pa.clone(),ctrl,pb.clone());
  cr.push({curve,a,b});
  const pts=curve.getPoints(30);
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:0x3d7acc,transparent:true,opacity:0.22});
  const line=new THREE.Line(geo,mat);
  line.userData={a,b};scene.add(line);ll.push(line);
});

const pts2=[];
cr.forEach(({curve,b})=>{
  const tly=LY[ND.find(n=>n.id===b)?.l];
  for(let i=0;i<2;i++){
    const geo=new THREE.SphereGeometry(0.07,5,5);
    const mat=new THREE.MeshBasicMaterial({color:tly?.c||0x4af0d0});
    const m=new THREE.Mesh(geo,mat);
    scene.add(m);
    pts2.push({m,curve,t:Math.random(),s:0.11+Math.random()*0.1});
  }
});

const lbs={};
ND.forEach(n=>{
  const el=document.createElement('div');
  el.className='nl';el.textContent=n.lb;
  ov.appendChild(el);lbs[n.id]=el;
});

const rc=new THREE.Raycaster(),mv=new THREE.Vector2();
let hov=null,sel=null,selD=null,drag=false,lx=0,ly2=0,dd=0,hasDrag=false;

function getUV(e){
  const r=cv.getBoundingClientRect();
  return [(e.clientX-r.left)/r.width*2-1,-(e.clientY-r.top)/r.height*2+1];
}
function pk(uv){
  mv.set(...uv);rc.setFromCamera(mv,cam);
  const h=rc.intersectObjects(ml);
  return h.length?h[0].object:null;
}
function doSel(m){
  sel=m;selD=m?m.userData:null;
  if(m){
    document.getElementById('ipn').textContent=m.userData.lb;
    document.getElementById('ipl').textContent=m.userData.lname;
    const cnt=CO.filter(([a,b])=>a===m.userData.id||b===m.userData.id).length;
    document.getElementById('ipd').textContent=cnt+' connection'+(cnt!==1?'s':'');
    document.getElementById('ip').style.display='block';
    ll.forEach(l=>{
      const on=l.userData.a===m.userData.id||l.userData.b===m.userData.id;
      l.material.opacity=on?0.92:0.04;
      l.material.color.setHex(on?0x4af0d0:0x3d7acc);
    });
    ml.forEach(n=>{
      const isSel=n===m;
      const isAdj=CO.some(([a,b])=>(a===m.userData.id&&b===n.userData.id)||(b===m.userData.id&&a===n.userData.id));
      n.material.opacity=isSel||isAdj?1:0.16;
    });
  } else {
    document.getElementById('ip').style.display='none';
    ll.forEach(l=>{l.material.opacity=0.22;l.material.color.setHex(0x3d7acc);});
    ml.forEach(n=>{n.material.opacity=0.88;});
  }
}

window.doask=function(){
  if(selD)sendPrompt('In a full-stack web app, explain what "'+selD.lb+'" ('+selD.lname+' layer) does and how its connections to other layers fit into the overall architecture');
};
window.flt=function(id){
  ['a','db','be','api','fe'].forEach(k=>{
    const b=document.getElementById('f'+k);if(!b)return;
    const active=(k==='a'?id==='all':id===k);
    b.style.background=active?'var(--color-text-primary)':'transparent';
    b.style.color=active?'var(--color-background-primary)':'var(--color-text-secondary)';
  });
  ml.forEach(m=>{m.visible=id==='all'||m.userData.l===id;});
  Object.entries(lbs).forEach(([nid,el])=>{
    const n=ND.find(x=>x.id===nid);
    el.style.display=(id==='all'||n?.l===id)?'':'none';
  });
};

cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly2=e.clientY;dd=0;hasDrag=false;cv.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{
  if(drag){
    dd+=Math.abs(e.clientX-lx)+Math.abs(e.clientY-ly2);
    if(dd>4)hasDrag=true;
    th-=(e.clientX-lx)*0.007;
    ph=Math.max(0.16,Math.min(1.46,ph-(e.clientY-ly2)*0.007));
    lx=e.clientX;ly2=e.clientY;uc();
  } else {
    const uv=getUV(e);
    if(uv[0]>=-1&&uv[0]<=1&&uv[1]>=-1&&uv[1]<=1){
      hov=pk(uv);cv.style.cursor=hov?'pointer':'grab';
    }
  }
});
window.addEventListener('mouseup',()=>{drag=false;cv.style.cursor=hov?'pointer':'grab';});
cv.addEventListener('click',e=>{if(!hasDrag)doSel(pk(getUV(e)));});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  rr=Math.max(8,Math.min(60,rr+e.deltaY*0.07));uc();
},{passive:false});
cv.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly2=e.touches[0].clientY;dd=0;hasDrag=false;},{passive:true});
window.addEventListener('touchmove',e=>{
  if(!drag||!e.touches.length)return;
  dd+=Math.abs(e.touches[0].clientX-lx)+Math.abs(e.touches[0].clientY-ly2);
  if(dd>4)hasDrag=true;
  th-=(e.touches[0].clientX-lx)*0.007;
  ph=Math.max(0.16,Math.min(1.46,ph-(e.touches[0].clientY-ly2)*0.007));
  lx=e.touches[0].clientX;ly2=e.touches[0].clientY;uc();
},{passive:true});
window.addEventListener('touchend',()=>{drag=false;});

const tv=new THREE.Vector3();
let lt=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lt)/1000,0.05);lt=t;
  if(!drag&&!sel){th+=dt*0.035;uc();}
  pts2.forEach(p=>{p.t=(p.t+dt*p.s)%1;p.m.position.copy(p.curve.getPoint(p.t));});
  const cw=cv.clientWidth||W;
  ND.forEach(n=>{
    const m=mm[n.id];
    if(!m.visible){lbs[n.id].style.display='none';return;}
    tv.copy(m.position).project(cam);
    if(tv.z>1){lbs[n.id].style.display='none';return;}
    lbs[n.id].style.display='';
    lbs[n.id].style.left=((tv.x*0.5+0.5)*cw)+'px';
    lbs[n.id].style.top=((-tv.y*0.5+0.5)*H)+'px';
    const isHov=m===hov||m===sel;
    const isAdj=sel?CO.some(([a,b])=>(a===sel.userData.id&&b===n.id)||(b===sel.userData.id&&a===n.id)):false;
    lbs[n.id].style.opacity=isHov?'1':(sel?(isAdj?'0.7':'0.1'):'0.48');
    lbs[n.id].classList.toggle('hi',isHov);
  });
  renderer.render(scene,cam);
}
loop(0);

window.addEventListener('resize',()=>{
  W=cv.parentElement?.clientWidth||680;
  renderer.setSize(W,H);
  cam.aspect=W/H;cam.updateProjectionMatrix();
});
})();
</script>
